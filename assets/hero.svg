<svg viewBox="0 0 1200 380" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="img" aria-label="K-Sliding Open Archive">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f15"/>
      <stop offset="1" stop-color="#111a23"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#16222e" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="1200" height="380" fill="url(#bg)"/>
  <rect width="1200" height="380" fill="url(#grid)" opacity="0.45"/>

  <!-- title block -->
  <g text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="600" y="152" font-size="62" font-weight="800" fill="#e9eef5" letter-spacing="3">
      K-SLIDING
      <animate attributeName="opacity" from="0" to="1" dur="0.9s" fill="freeze"/>
    </text>
    <text x="600" y="196" font-size="27" font-weight="600" fill="#2dd4bf" letter-spacing="11">
      OPEN ARCHIVE
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="1.1s" fill="freeze"/>
    </text>
    <text x="600" y="228" font-size="13.5" fill="#7e8da0" letter-spacing="4" font-family="Consolas, 'Courier New', monospace">
      KOREA BOBSLED &amp; SKELETON FEDERATION
    </text>
  </g>

  <!-- sliding track -->
  <path id="trackpath" d="M 30 300 C 230 300 270 252 460 256 S 720 332 900 296 S 1110 252 1172 282"
        fill="none" stroke="url(#track)" stroke-width="5" stroke-linecap="round" filter="url(#glow)" opacity="0.95"/>

  <!-- flowing light pulse along the track -->
  <path d="M 30 300 C 230 300 270 252 460 256 S 720 332 900 296 S 1110 252 1172 282"
        fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-dasharray="38 520" opacity="0.9">
    <animate attributeName="stroke-dashoffset" from="560" to="0" dur="2.6s" repeatCount="indefinite"/>
  </path>

  <!-- start / finish markers -->
  <circle cx="30" cy="300" r="5" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="1172" cy="282" r="5" fill="#f59e0b" filter="url(#glow)"/>

  <!-- gliding athlete dot -->
  <circle r="13" fill="#fbbf24" opacity="0.30" filter="url(#soft)">
    <animateMotion dur="5s" repeatCount="indefinite"><mpath xlink:href="#trackpath"/></animateMotion>
  </circle>
  <circle r="6" fill="#fde68a" filter="url(#glow)">
    <animateMotion dur="5s" repeatCount="indefinite"><mpath xlink:href="#trackpath"/></animateMotion>
    <animate attributeName="r" values="5;7;5" dur="1.3s" repeatCount="indefinite"/>
  </circle>
</svg>
